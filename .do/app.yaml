name: realms-backend
region: fra

domains:
  - domain: api.realms.anguelz.tech
    type: PRIMARY

services:
  - name: backend
    github:
      repo: aouichou/realms
      branch: main
      deploy_on_push: true
    source_dir: /backend
    dockerfile_path: /backend/Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-s
    health_check:
      http_path: /health
      initial_delay_seconds: 120
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 5
    envs:
      # Application
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: LOG_LEVEL
        value: WARNING
      - key: APP_NAME
        value: mistral-realms
      - key: PORT
        value: "8000"

      # CORS
      - key: CORS_ORIGINS
        value: "https://realms.anguelz.tech,https://www.realms.anguelz.tech"
      - key: API_BASE_URL
        value: "https://api.realms.anguelz.tech"
      - key: FRONTEND_URL
        value: "https://realms.anguelz.tech"

      # AI API Keys (encrypted)
      - key: MISTRAL_API_KEY
        value: "Wd0SfJzWF1S7SX7YfMch3fUla2JV0ZFq"
        type: SECRET
      - key: MISTRAL_MODEL
        value: mistral-small-latest
      - key: MISTRAL_MAX_TOKENS
        value: "2048"
      - key: MISTRAL_TEMPERATURE
        value: "0.7"
      - key: QWEN_API_KEY
        value: "sk-f646d23794d948c1ab0be051def68e21"
        type: SECRET
      - key: QWEN_MODEL
