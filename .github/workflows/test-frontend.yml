# ──────────────────────────────────────────────────────────────
# Frontend Test Pipeline
# Lint → Typecheck → Dead code → Unit tests → Build → E2E
# ──────────────────────────────────────────────────────────────
name: Test Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/test-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/test-frontend.yml'

permissions:
  contents: read

concurrency:
  group: test-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Knip (dead code detection)
        run: npx knip --no-exit-code || true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Run Vitest
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.realms.anguelz.tech

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: nextjs-build
          path: frontend/.next/
          retention-days: 1

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: frontend/.next/

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start server & run E2E
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 30000
          PLAYWRIGHT_BASE_URL=http://localhost:3000 npx playwright test
        env:
          NEXT_PUBLIC_API_URL: https://api.realms.anguelz.tech

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
