services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: realms-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=mistral_realms
      - POSTGRES_USER=realms_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-realms_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realms_user -d mistral_realms"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - realms-network

  # Redis for session storage
  redis:
    image: redis:7-alpine
    container_name: realms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - realms-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: realms-backend
    ports:
      - "8000:8000"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mistral_realms
      - POSTGRES_USER=realms_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-realms_password}
      - ENVIRONMENT=production
      - DEBUG=False
      - USE_TRUE_RANDOMNESS=${USE_TRUE_RANDOMNESS:-True}
      - RANDOM_ORG_URL=${RANDOM_ORG_URL:-https://www.random.org/integers/}
      - RANDOM_POOL_SIZE=${RANDOM_POOL_SIZE:-200}
      - RANDOM_POOL_MIN_THRESHOLD=${RANDOM_POOL_MIN_THRESHOLD:-50}
      - RANDOM_POOL_TIMEOUT=${RANDOM_POOL_TIMEOUT:-30.0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=3.0)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - realms-network

  # Frontend Web App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: realms-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - realms-network

networks:
  realms-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
