global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'mistral-realms'
    environment: 'production'

# Load alerting rules
rule_files:
  - '/etc/prometheus/alerts.yml'

# Alertmanager configuration (optional - configure if using Alertmanager)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - 'alertmanager:9093'

scrape_configs:
  # Main Backend API
  - job_name: 'backend-api'
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend-api'
          component: 'fastapi'
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Prometheus Self-Monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          component: 'monitoring'

  # Node Exporter (if available - for system metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          component: 'system'
    # Only scrape if node-exporter is running
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'node-exporter:9100'

  # PostgreSQL Exporter (if available)
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres-exporter'
          component: 'database'
    # Only scrape if postgres-exporter is running
    relabel_configs:
      - source_labels: [__address__]
        action: keep
        regex: '.+'

  # Redis Exporter (if available)
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis-exporter'
          component: 'cache'
    # Only scrape if redis-exporter is running
    relabel_configs:
      - source_labels: [__address__]
        action: keep
        regex: '.+'
