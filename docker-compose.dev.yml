services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: realms-postgres-dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=mistral_realms
      - POSTGRES_USER=realms_user
      - POSTGRES_PASSWORD=realms_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realms_user -d mistral_realms"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realms-network

  # Redis for session storage
  redis:
    image: redis:7-alpine
    container_name: realms-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - realms-network

  # Backend API (Development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: realms-backend-dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/tests:/app/tests:ro
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://realms_user:realms_password@postgres:5432/mistral_realms
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENVIRONMENT=development
      - DEBUG=True
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - realms-network

  # Frontend Web App (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: realms-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/lib:/app/lib
      - ./frontend/public:/app/public
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
    depends_on:
      - backend
    networks:
      - realms-network

networks:
  realms-network:
    driver: bridge

volumes:
  postgres-data:
    external: true
    name: realms_postgres-data
  redis-data:
    driver: local
