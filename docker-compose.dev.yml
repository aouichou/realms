services:
  # PostgreSQL Database with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: realms-postgres-dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=mistral_realms
      - POSTGRES_USER=realms_user
      - POSTGRES_PASSWORD=realms_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realms_user -d mistral_realms"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realms-network

  # Redis for session storage
  redis:
    image: redis:7-alpine
    container_name: realms-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - realms-network

  # Backend API (Development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: realms-backend-dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app:rw
      - ./backend/tests:/app/tests:rw
      - ./backend/alembic:/app/alembic:rw
      - ./backend/scripts:/app/scripts:rw
      - ./backend/data:/app/data:rw
      - ./backend/media:/app/media  # For generated images and other media files
      - ./backend/logs:/app/logs  # For error logs and other application logs
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3-flash-preview}
      - GEMINI_THINKING_LEVEL=${GEMINI_THINKING_LEVEL:-high}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_MODEL=${QWEN_MODEL:-qwen-max}
      - QWEN_MAX_TOKENS=${QWEN_MAX_TOKENS:-2048}
      - QWEN_TEMPERATURE=${QWEN_TEMPERATURE:-0.7}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mistral_realms
      - POSTGRES_USER=realms_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-realms_password}
      - ENVIRONMENT=development
      - DEBUG=True
      - USE_TRUE_RANDOMNESS=${USE_TRUE_RANDOMNESS:-True}
      - RANDOM_ORG_URL=${RANDOM_ORG_URL:-https://www.random.org/integers/}
      - RANDOM_POOL_SIZE=${RANDOM_POOL_SIZE:-200}
      - RANDOM_POOL_MIN_THRESHOLD=${RANDOM_POOL_MIN_THRESHOLD:-50}
      - RANDOM_POOL_TIMEOUT=${RANDOM_POOL_TIMEOUT:-30.0}
      - OTLP_ENDPOINT=http://jaeger:4317
      - TRACING_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
    networks:
      - realms-network

  # Frontend Web App (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: realms-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/lib:/app/lib
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
    depends_on:
      - backend
    networks:
      - realms-network

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: realms-jaeger-dev
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
    networks:
      - realms-network

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: realms-prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - realms-network

  # Grafana for metrics visualization
  grafana:
    image: grafana/grafana:10.2.3
    container_name: realms-grafana-dev
    ports:
      - "3001:3000"  # Using 3001 to avoid conflict with frontend
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - realms-network

networks:
  realms-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
