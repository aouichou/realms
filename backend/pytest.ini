# Test Configuration
[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
asyncio_mode = "auto"

addopts = [
    "--verbose",
    "--cov=app",
    "--cov-report=term-missing",
    "--cov-report=html",
]

markers = [
    "integration: integration tests requiring external services",
    "slow: slow running tests",
]
